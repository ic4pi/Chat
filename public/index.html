<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Uncensored Chat</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<div id="app">

  <!-- Backdrop shown behind sidebars on mobile; tap to dismiss. -->
  <div id="backdrop" class="backdrop hidden"></div>

  <!-- Left sidebar: chat list. Starts collapsed by default; JS opens it on
       desktop viewports so mobile doesn't flash an overlay before JS runs. -->
  <aside id="chatsSidebar" class="sidebar left collapsed">
    <div class="sidebar-header">
      <span class="sidebar-title">Chats</span>
      <div class="sidebar-header-actions">
        <button id="newChatBtn" class="icon-btn" title="New chat">+</button>
        <button id="closeChats" class="icon-btn" title="Hide">×</button>
      </div>
    </div>
    <ul id="chatList" class="chat-list"></ul>
    <div class="sidebar-footer">
      <button id="exportBtn" class="text-btn" title="Export all data as JSON">Export</button>
      <button id="importBtn" class="text-btn" title="Import data from JSON">Import</button>
      <input id="importFile" type="file" accept="application/json" hidden />
      <button id="clearAllBtn" class="text-btn danger" title="Delete all local data">Clear all</button>
    </div>
  </aside>

  <!-- Main chat pane -->
  <main id="main">
    <header id="topbar">
      <div class="topbar-row primary">
        <button id="toggleChats" class="icon-btn" title="Toggle chat list">☰</button>
        <button id="newChatTopBtn" class="icon-btn accent" title="New chat" aria-label="New chat">+</button>
        <h1 id="chatTitle" contenteditable="true" spellcheck="false">Untitled</h1>
        <a id="adminLink" class="icon-btn" href="/admin" target="_blank" rel="noopener" title="Admin (personas &amp; master prompt)">⚙</a>
        <button id="toggleArtifacts" class="icon-btn" title="Toggle artifacts">📎</button>
      </div>
      <div class="topbar-row controls">
        <label class="ctrl">
          <span>provider</span>
          <select id="providerSelect">
            <option value="venice">Venice</option>
            <option value="openrouter">OpenRouter</option>
          </select>
        </label>
        <label class="ctrl">
          <span>model</span>
          <select id="modelSelect"></select>
        </label>
        <label class="ctrl">
          <span>persona</span>
          <select id="personaSelect"></select>
        </label>
      </div>
    </header>

    <div id="chat"></div>
    <div id="typing">model is thinking…</div>

    <form id="inputForm">
      <textarea id="input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </main>

  <!-- Right sidebar: artifacts -->
  <aside id="artifactsSidebar" class="sidebar right collapsed">
    <div class="sidebar-header">
      <span class="sidebar-title">Artifacts</span>
      <button id="closeArtifacts" class="icon-btn" title="Hide">×</button>
    </div>
    <ul id="artifactList" class="artifact-list"></ul>
    <div class="artifact-empty">
      Code blocks and documents the model produces will appear here with copy &amp; download buttons.
    </div>
  </aside>

</div>

<!-- Hidden artifact viewer -->
<div id="artifactModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 id="artifactModalTitle">Artifact</h2>
      <div class="modal-header-actions">
        <button id="artifactCopyBtn" class="text-btn">Copy</button>
        <button id="artifactDownloadBtn" class="text-btn">Download</button>
        <button id="closeArtifactModal" class="icon-btn" title="Close (Esc)">×</button>
      </div>
    </div>
    <pre id="artifactModalContent" class="artifact-view"></pre>
  </div>
</div>

<!-- Visible boot-time error banner shown if the JS module fails to run. -->
<div id="bootError" style="display:none;position:fixed;left:0;right:0;top:0;padding:14px 18px;background:#2a1010;color:#ff9b9b;border-bottom:1px solid #5a1f1f;font-family:monospace;font-size:12px;z-index:200;white-space:pre-wrap;"></div>

<noscript>
  <div style="padding:20px;color:#ff9b9b;background:#2a1010;font-family:monospace;font-size:13px;">
    This chat UI requires JavaScript. Enable it in your browser's settings and reload.
  </div>
</noscript>

<script>
  // Report any uncaught script errors before / during module boot in a
  // human-visible way — never leave the user staring at a blank screen.
  (function () {
    function show(msg) {
      var el = document.getElementById('bootError');
      if (!el) return;
      el.style.display = 'block';
      el.textContent = 'Boot error: ' + msg + '\n\nTry a hard refresh (⌘/Ctrl+Shift+R) or clear this site\'s data.';
    }
    window.addEventListener('error', function (e) {
      show((e.error && (e.error.stack || e.error.message)) || e.message || String(e));
    });
    window.addEventListener('unhandledrejection', function (e) {
      show((e.reason && (e.reason.stack || e.reason.message)) || String(e.reason));
    });
  })();
</script>
<script src="/app.js" type="module"></script>
</body>
</html>
