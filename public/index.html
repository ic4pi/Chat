<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS // Chat</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #131313;
    --sidebar-bg: #0d0d0d;
    --border: #262626;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #d4ff3f;
    --user-bubble: #1f1f1f;
    --bot-bubble: #161616;
    --sidebar-w: 260px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'JetBrains Mono', ui-monospace, monospace;
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
  }
  #sidebar.open { transform: translateX(0); }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 199;
    backdrop-filter: blur(1px);
  }
  #overlay.show { display: block; }

  .sidebar-top {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
  }
  #newChatBtn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 9px 12px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, color 0.15s;
  }
  #newChatBtn:hover { border-color: var(--accent); color: var(--accent); }

  #historyList {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .history-empty {
    padding: 16px 14px;
    font-size: 11px;
    color: var(--muted);
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    border-left: 2px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    transition: background 0.1s, color 0.1s;
  }
  .history-item:hover { color: var(--text); background: #181818; }
  .history-item.active { border-left-color: var(--accent); color: var(--text); background: #181818; }
  .history-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .history-del {
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 1px 5px;
    flex-shrink: 0;
    transition: color 0.1s;
  }
  .history-item:hover .history-del { opacity: 1; }
  .history-del:hover { color: #ff6b6b; }

  .sidebar-bottom {
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  .sidebar-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 7px;
  }
  #modelSelect {
    width: 100%;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 6px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }
  #modelSelect optgroup { color: var(--muted); font-style: normal; font-size: 10px; }
  #modelSelect option { color: var(--text); font-size: 11px; background: #1a1a1a; }

  /* ── MAIN AREA ── */
  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100dvh;
  }

  header {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #hamburger {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 17px;
    cursor: pointer;
    padding: 4px 5px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
    border-radius: 4px;
  }
  #hamburger:hover { color: var(--accent); }
  header h1 {
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    flex: 1;
  }
  #providerBadge {
    font-size: 10px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 7px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 75ch;
    padding: 10px 14px;
    border-radius: 10px;
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 14px;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border: 1px solid var(--border);
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
  }
  .msg.error {
    align-self: flex-start;
    background: #2a1010;
    border: 1px solid #5a1f1f;
    color: #ff9b9b;
  }
  .msg.info {
    align-self: flex-start;
    background: #111a0f;
    border: 1px solid #2a4020;
    color: #8fbf6f;
    font-size: 12px;
  }
  .msg .role {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 5px;
  }
  #typing {
    align-self: flex-start;
    font-size: 12px;
    color: var(--muted);
    padding: 4px 20px;
    display: none;
  }

  form#inputForm {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  textarea#input {
    flex: 1;
    resize: none;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    max-height: 160px;
    transition: outline 0.1s;
  }
  textarea#input:focus { outline: 1px solid var(--accent); }
  button#sendBtn {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="overlay"></div>

<nav id="sidebar">
  <div class="sidebar-top">
    <button id="newChatBtn">+ New Chat</button>
  </div>
  <div id="historyList"></div>
  <div class="sidebar-bottom">
    <span class="sidebar-label">Model</span>
    <select id="modelSelect">
      <optgroup label="── Venice (credits) ──">
        <option value="venice-uncensored">Dolphin Uncensored 24B</option>
        <option value="venice-uncensored-role-play">Role Play Uncensored 128K</option>
        <option value="olafangensan-glm-4.7-flash-heretic">GLM 4.7 Flash Heretic</option>
        <option value="qwen3-235b-a22b-instruct-2507">Qwen3 235B Instruct</option>
      </optgroup>
      <optgroup label="── OpenRouter (credits) ──">
        <option value="cognitivecomputations/dolphin-mistral-24b-venice-edition">Dolphin Mistral 24B</option>
        <option value="nousresearch/hermes-3-llama-3.1-405b">Hermes 3 405B</option>
        <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B Instruct</option>
        <option value="google/gemma-4-26b-a4b-it">Gemma 4 26B</option>
      </optgroup>
      <optgroup label="── OpenRouter (free) ──">
        <option value="cognitivecomputations/dolphin-mistral-24b-venice-edition:free">Dolphin 24B (free)</option>
        <option value="nousresearch/hermes-3-llama-3.1-405b:free">Hermes 3 405B (free)</option>
        <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (free)</option>
      </optgroup>
    </select>
  </div>
</nav>

<div id="app">
  <header>
    <button id="hamburger" aria-label="Toggle sidebar">&#9776;</button>
    <h1>// nexus</h1>
    <span id="providerBadge">venice</span>
  </header>

  <div id="chat"></div>
  <div id="typing">nexus is thinking…</div>

  <form id="inputForm">
    <textarea id="input" rows="1" placeholder="Type a message…" autofocus></textarea>
    <button id="sendBtn" type="submit">Send</button>
  </form>
</div>

<script>
  // ── Element refs ──
  const sidebar     = document.getElementById('sidebar');
  const overlay     = document.getElementById('overlay');
  const hamburger   = document.getElementById('hamburger');
  const newChatBtn  = document.getElementById('newChatBtn');
  const historyList = document.getElementById('historyList');
  const modelSelect = document.getElementById('modelSelect');
  const providerBadge = document.getElementById('providerBadge');
  const chatEl      = document.getElementById('chat');
  const formEl      = document.getElementById('inputForm');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('sendBtn');
  const typingEl    = document.getElementById('typing');

  // ── Sidebar ──
  function openSidebar()  { sidebar.classList.add('open');  overlay.classList.add('show');  }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
  hamburger.addEventListener('click', () =>
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
  );
  overlay.addEventListener('click', closeSidebar);

  // ── Provider badge ──
  function updateBadge() {
    const m = modelSelect.value;
    const provider = m.includes('/') ? 'openrouter' : 'venice';
    const tier = m.endsWith(':free') ? ' · free' : ' · paid';
    providerBadge.textContent = provider + tier;
  }
  modelSelect.addEventListener('change', updateBadge);
  updateBadge();

  // ── Session storage ──
  const STORE_KEY = 'nexus_sessions';

  function loadSessions() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch { return []; }
  }
  function saveSessions(arr) {
    localStorage.setItem(STORE_KEY, JSON.stringify(arr));
  }

  let sessions  = loadSessions();
  let currentId = null;
  let history   = [];

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }
  function makeTitle(text) {
    return text.replace(/\n/g, ' ').slice(0, 40) + (text.length > 40 ? '…' : '');
  }

  function renderHistory() {
    historyList.innerHTML = '';
    if (sessions.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'history-empty';
      empty.textContent = 'No previous chats.';
      historyList.appendChild(empty);
      return;
    }
    [...sessions].reverse().forEach(s => {
      const item  = document.createElement('div');
      item.className = 'history-item' + (s.id === currentId ? ' active' : '');

      const title = document.createElement('span');
      title.className = 'history-item-title';
      title.textContent = s.title || 'Untitled';

      const del = document.createElement('button');
      del.className = 'history-del';
      del.textContent = '×';
      del.setAttribute('aria-label', 'Delete chat');
      del.addEventListener('click', e => { e.stopPropagation(); deleteSession(s.id); });

      item.appendChild(title);
      item.appendChild(del);
      item.addEventListener('click', () => switchSession(s.id));
      historyList.appendChild(item);
    });
  }

  function persistCurrent() {
    if (!currentId || history.length === 0) return;
    const idx = sessions.findIndex(s => s.id === currentId);
    const record = {
      id: currentId,
      title: makeTitle(history.find(m => m.role === 'user')?.content || 'Untitled'),
      messages: [...history],
      model: modelSelect.value,
      updatedAt: Date.now(),
    };
    if (idx >= 0) sessions[idx] = record;
    else sessions.push(record);
    saveSessions(sessions);
    renderHistory();
  }

  function switchSession(id) {
    persistCurrent();
    const s = sessions.find(s => s.id === id);
    if (!s) return;
    currentId = id;
    history   = [...s.messages];
    if (s.model) { modelSelect.value = s.model; updateBadge(); }
    renderMessages();
    renderHistory();
    closeSidebar();
  }

  function deleteSession(id) {
    sessions = sessions.filter(s => s.id !== id);
    saveSessions(sessions);
    if (id === currentId) startNewChat(false);
    else renderHistory();
  }

  function startNewChat(andClose = true) {
    persistCurrent();
    currentId = genId();
    history   = [];
    chatEl.innerHTML = '';
    renderHistory();
    if (andClose) closeSidebar();
    inputEl.focus();
  }

  function renderMessages() {
    chatEl.innerHTML = '';
    history.forEach(m => {
      if (m.role === 'user') addMsg('user', m.content);
      else if (m.role === 'assistant') addMsg('bot', m.content);
    });
  }

  newChatBtn.addEventListener('click', () => startNewChat(true));

  // ── Messages ──
  function addMsg(role, text) {
    const div   = document.createElement('div');
    div.className = 'msg ' + role;
    const label = document.createElement('span');
    label.className = 'role';
    label.textContent = role === 'user' ? 'you'
                      : role === 'error' ? 'error'
                      : role === 'info'  ? 'notice'
                      : 'nexus';
    div.appendChild(label);
    div.appendChild(document.createTextNode(text));
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  // ── Textarea auto-height ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); formEl.requestSubmit(); }
  });

  // ── Send message ──
  formEl.addEventListener('submit', async e => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text) return;

    if (!currentId) currentId = genId();

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    typingEl.style.display = 'block';

    try {
      const res  = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, model: modelSelect.value }),
      });
      const data = await res.json();

      if (!res.ok) {
        const detail = data.tried ? ` (tried: ${data.tried.join(' → ')})` : '';
        addMsg('error', (data.error || 'Request failed') + detail);
      } else {
        const reply = data.reply || '(empty response)';
        addMsg('bot', reply);
        history.push({ role: 'assistant', content: data.reply || '' });
        persistCurrent();
        if (data.fallback) {
          addMsg('info', `Primary model (${data.originalModel}) unavailable — used ${data.model} instead.`);
        }
      }
    } catch (err) {
      addMsg('error', err.message || 'Network error');
    } finally {
      sendBtn.disabled = false;
      typingEl.style.display = 'none';
      inputEl.focus();
    }
  });

  // ── Init ──
  currentId = genId();
  renderHistory();
</script>

</body>
</html>
