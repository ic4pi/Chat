<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Uncensored Chat</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<div id="app">

  <!-- Backdrop shown behind sidebars on mobile; tap to dismiss. -->
  <div id="backdrop" class="backdrop hidden"></div>

  <!-- Left sidebar: chat list -->
  <aside id="chatsSidebar" class="sidebar left">
    <div class="sidebar-header">
      <span class="sidebar-title">Chats</span>
      <div class="sidebar-header-actions">
        <button id="newChatBtn" class="icon-btn" title="New chat">+</button>
        <button id="closeChats" class="icon-btn" title="Hide">×</button>
      </div>
    </div>
    <ul id="chatList" class="chat-list"></ul>
    <div class="sidebar-footer">
      <button id="exportBtn" class="text-btn" title="Export all data as JSON">Export</button>
      <button id="importBtn" class="text-btn" title="Import data from JSON">Import</button>
      <input id="importFile" type="file" accept="application/json" hidden />
      <button id="clearAllBtn" class="text-btn danger" title="Delete all local data">Clear all</button>
    </div>
  </aside>

  <!-- Main chat pane -->
  <main id="main">
    <header id="topbar">
      <button id="toggleChats" class="icon-btn" title="Toggle chat list">☰</button>
      <h1 id="chatTitle" contenteditable="true" spellcheck="false">Untitled</h1>
      <div class="topbar-controls">
        <label class="ctrl">
          <span>provider</span>
          <select id="providerSelect">
            <option value="venice">Venice</option>
            <option value="openrouter">OpenRouter</option>
          </select>
        </label>
        <label class="ctrl">
          <span>model</span>
          <select id="modelSelect"></select>
        </label>
        <label class="ctrl">
          <span>persona</span>
          <select id="personaSelect"></select>
        </label>
        <button id="openPersonasBtn" class="icon-btn" title="Manage personas (⌘/Ctrl+K)">⚙</button>
        <button id="toggleArtifacts" class="icon-btn" title="Toggle artifacts">📎</button>
      </div>
    </header>

    <div id="chat"></div>
    <div id="typing">model is thinking…</div>

    <form id="inputForm">
      <textarea id="input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </main>

  <!-- Right sidebar: artifacts -->
  <aside id="artifactsSidebar" class="sidebar right collapsed">
    <div class="sidebar-header">
      <span class="sidebar-title">Artifacts</span>
      <button id="closeArtifacts" class="icon-btn" title="Hide">×</button>
    </div>
    <ul id="artifactList" class="artifact-list"></ul>
    <div class="artifact-empty">
      Code blocks and documents the model produces will appear here with copy &amp; download buttons.
    </div>
  </aside>

</div>

<!-- Hidden persona-manager screen -->
<div id="personaModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="personaModalTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 id="personaModalTitle">Personas</h2>
      <button id="closePersonasBtn" class="icon-btn" title="Close (Esc)">×</button>
    </div>
    <div class="modal-body persona-manager">
      <div class="persona-list-pane">
        <button id="newPersonaBtn" class="text-btn primary">+ New persona</button>
        <ul id="personaList" class="persona-list"></ul>
      </div>
      <div class="persona-edit-pane">
        <label class="field">
          <span>Name</span>
          <input id="personaNameInput" type="text" placeholder="e.g. Terse code reviewer" />
        </label>
        <label class="field grow">
          <span>System prompt</span>
          <textarea id="personaPromptInput" spellcheck="false" placeholder="You are..."></textarea>
        </label>
        <div class="persona-actions">
          <button id="savePersonaBtn" class="text-btn primary">Save</button>
          <button id="usePersonaBtn" class="text-btn">Use for this chat</button>
          <button id="deletePersonaBtn" class="text-btn danger">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Hidden artifact viewer -->
<div id="artifactModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 id="artifactModalTitle">Artifact</h2>
      <div class="modal-header-actions">
        <button id="artifactCopyBtn" class="text-btn">Copy</button>
        <button id="artifactDownloadBtn" class="text-btn">Download</button>
        <button id="closeArtifactModal" class="icon-btn" title="Close (Esc)">×</button>
      </div>
    </div>
    <pre id="artifactModalContent" class="artifact-view"></pre>
  </div>
</div>

<script src="/app.js" type="module"></script>
</body>
</html>
