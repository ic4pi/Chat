<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uncensored Chat</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #131313;
    --border: #262626;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #d4ff3f;
    --user-bubble: #1f1f1f;
    --bot-bubble: #161616;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'JetBrains Mono', ui-monospace, monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
    color: var(--accent);
  }
  header select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
    max-width: 280px;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 75ch;
    padding: 10px 14px;
    border-radius: 10px;
    white-space: pre-wrap;
    line-height: 1.45;
    font-size: 14px;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border: 1px solid var(--border);
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
  }
  .msg.error {
    align-self: flex-start;
    background: #2a1010;
    border: 1px solid #5a1f1f;
    color: #ff9b9b;
  }
  .msg .role {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  #typing {
    align-self: flex-start;
    font-size: 12px;
    color: var(--muted);
    padding: 0 14px;
    display: none;
  }
  form#inputForm {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
  }
  textarea#input {
    flex: 1;
    resize: none;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    max-height: 160px;
  }
  textarea#input:focus { outline: 1px solid var(--accent); }
  button#sendBtn {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>// uncensored_chat</h1>
  <select id="modelSelect">
    <option value="cognitivecomputations/dolphin3.0-mistral-24b:free">Dolphin 3.0 Mistral 24B (free)</option>
    <option value="cognitivecomputations/dolphin-mixtral-8x22b:free">Dolphin Mixtral 8x22B (free)</option>
    <option value="mistralai/mistral-7b-instruct:free">Mistral 7B Instruct (free)</option>
    <option value="huggingfaceh4/zephyr-7b-beta:free">Zephyr 7B Beta (free)</option>
  </select>
</header>

<div id="chat"></div>
<div id="typing">model is thinking…</div>

<form id="inputForm">
  <textarea id="input" rows="1" placeholder="Type a message…" autofocus></textarea>
  <button id="sendBtn" type="submit">Send</button>
</form>

<script>
  const chatEl = document.getElementById('chat');
  const formEl = document.getElementById('inputForm');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const typingEl = document.getElementById('typing');
  const modelSelect = document.getElementById('modelSelect');

  let history = [];

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const label = document.createElement('span');
    label.className = 'role';
    label.textContent = role === 'user' ? 'you' : role === 'error' ? 'error' : 'model';
    div.appendChild(label);
    div.appendChild(document.createTextNode(text));
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      formEl.requestSubmit();
    }
  });

  formEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    typingEl.style.display = 'block';

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, model: modelSelect.value }),
      });
      const data = await res.json();

      if (!res.ok) {
        addMessage('error', data.error || 'Request failed');
      } else {
        addMessage('bot', data.reply || '(empty response)');
        history.push({ role: 'assistant', content: data.reply || '' });
      }
    } catch (err) {
      addMessage('error', err.message || 'Network error');
    } finally {
      sendBtn.disabled = false;
      typingEl.style.display = 'none';
      inputEl.focus();
    }
  });
</script>

</body>
</html>
